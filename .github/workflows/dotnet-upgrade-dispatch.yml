name: dotnet-upgrade-dispatch
on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  validate-and-assign:
    if: contains(github.event.issue.labels.*.name, 'dotnet-upgrade')
    runs-on: ubuntu-latest
    steps:
      - name: Validate required fields + assign Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            function pickAfter(label) {
              const re = new RegExp(`###\\s+${label}\\s*\\n\\s*([^\\n]+)`, "i");
              const m = body.match(re);
              return m ? m[1].trim() : "";
            }

            const targetRepo = pickAfter("Target repository \\(owner/repo\\)");
            const baseBranchRaw = pickAfter("Base branch");
            const reviewer = pickAfter("PR reviewer \\(GitHub username\\)");

            const missing = [];
            if (!targetRepo || targetRepo.includes("my-org/my-repo")) missing.push("Target repository (owner/repo)");
            if (!reviewer || !reviewer.startsWith("@")) missing.push("PR reviewer (@username)");

            // If missing required info: comment + label + STOP (no agent run)
            if (missing.length) {
              const msg =
                `❌ **Missing required fields**: ${missing.join(", ")}\n\n` +
                `Please edit this issue and provide the missing values. **No automation was started.**`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: msg
              });

              // add a helper label if you want
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["needs-info"]
              });
              return;
            }

            // Avoid double-assign
            const alreadyAssigned = (issue.assignees || []).some(a => a.login === "copilot-swe-agent");
            if (alreadyAssigned) return;

            const baseBranch = baseBranchRaw || context.payload.repository.default_branch;

            // Assign Copilot Coding Agent using agent_assignment (REST)
            // See docs: agent_assignment supports target_repo, base_branch, custom_agent, etc.
            // copilot-swe-agent[bot] is the assignee to trigger coding agent.
            // Reference: GitHub Docs for coding agent REST assignment.
            await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: targetRepo,
                base_branch: baseBranch,
                custom_agent: "dotnet-upgrade"
              },
              headers: {
                "X-GitHub-Api-Version": "2022-11-28"
              }
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body:
                `✅ Assigned to Copilot Coding Agent.\n\n` +
                `- Target repo: \`${targetRepo}\`\n` +
                `- Base branch: \`${baseBranch}\`\n` +
                `- Reviewer: ${reviewer}\n`
            });
