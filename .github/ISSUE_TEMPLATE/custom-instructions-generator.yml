name: Custom Instructions Generator
description: "Copilot agent scans this repo, generates or updates copilot-instructions.md and code-review instructions, reviews the output, and opens a PR requesting review."
title: "[Instruction Generator] "
labels: ["copilot-instructions"]
assignees: ["copilot"]

body:
  - type: markdown
    attributes:
      value: |
        ## Custom Instructions Generator (Agent-Run)
        Submit this form and the assigned agent will scan the repo, generate instruction files, and open a PR.

  - type: textarea
    id: agent-instructions
    attributes:
      label: "Agent Instructions (DO NOT EDIT)"
      description: |
        ⚠️ DO NOT MODIFY — these instructions are required for the agent to work correctly. Editing may cause the agent to produce incorrect output.
      value: |
        1. Deep-scan this repo (all source files, dependencies, CI/CD pipelines, documentation) to understand its structure, technology stack, conventions, and patterns.
        2. Generate or update `.github/copilot-instructions.md` with the sections listed below.
        3. Create `.github/instructions/code-review.instructions.md` using the TEMPLATE below as the starting point.
           TEMPLATE (copy this exactly, then fill in the sections):
           ```
           ---
           description: "REPLACE_WITH_REPO_SPECIFIC_DESCRIPTION"
           applyTo: "**"
           excludeAgent: "coding-agent"
           ---
           ```
           a. Copy the TEMPLATE above as the first lines of code-review.instructions.md.
           b. Replace REPLACE_WITH_REPO_SPECIFIC_DESCRIPTION with a real description derived from this repo's name, purpose, and tech stack.
           c. Do NOT remove or modify the `applyTo` or `excludeAgent` lines — they must remain exactly as shown in the TEMPLATE.
           d. After the closing `---`, add the code review sections listed below.
        4. VALIDATION CHECKLIST — before proceeding, verify ALL of the following:
           a. code-review.instructions.md starts with a YAML frontmatter block (opening and closing `---`).
           b. The frontmatter contains `description:` with a repo-specific value (not the placeholder).
           c. The frontmatter contains `applyTo: "**"` exactly as in the template.
           d. The frontmatter contains `excludeAgent: "coding-agent"` exactly as in the template — open the file and confirm this line exists.
           e. The frontmatter contains exactly three fields: description, applyTo, excludeAgent. No others.
           f. copilot-instructions.md covers all requested sections.
           If any check fails, fix it before continuing. Do NOT open a PR until all checks pass.
        5. Open a PR requesting the designated reviewer (if provided) or CODEOWNERS.
        6. Link the PR to this issue so it auto-closes on merge.
        7. If required info is missing or the repo cannot be analyzed, comment on this issue and stop (no PR).
    validations:
      required: true

  - type: input
    id: reviewer
    attributes:
      label: PR reviewer (GitHub username, optional)
      description: Leave blank to default to CODEOWNERS.
      placeholder: "@codeowner"
    validations:
      required: false

  - type: textarea
    id: copilot-instructions-sections
    attributes:
      label: "Sections to include in copilot-instructions.md"
      description: |
        Select or customize the sections the agent should produce in copilot-instructions.md.
        Remove or add lines as needed. The agent will populate each section based on repo analysis.
      value: |
        - Project Overview & Structure
        - Technology Stack & Preferred Libraries
        - Coding Style & Naming Conventions
        - Architectural Patterns (to follow or avoid)
        - Security Requirements & Error Handling
        - Documentation Standards
    validations:
      required: true

  - type: textarea
    id: code-review-sections
    attributes:
      label: "Sections to include in code-review.instructions.md"
      description: "Customize the sections below. The agent will add the required frontmatter automatically from the template in Agent Instructions."
      value: |
        - Review Philosophy & Principles (when to comment, confidence threshold, what "high-confidence" means)
        - Primary Review Priorities (ordered list: security, correctness, architecture, rule violations, test coverage)
        - What NOT to Flag (linter/formatter territory, naming style, import order, whitespace, auto-generated files)
        - Comment Style & Tone (severity prefixes [blocking]/[suggestion]/[info], comment length, definitive not hedging)
        - Response Format (State the problem → why it matters → suggested fix)
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context or constraints (optional)
      description: |
        Provide any extra instructions the agent should follow, such as:
        - Specific conventions to enforce or avoid
        - Team preferences for naming, imports, or patterns
        - Sections to skip or emphasize
        - Links to external style guides
      placeholder: |
        - Enforce PascalCase for component names
        - We use Conventional Commits
        - Skip the security section — handled by a separate policy

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have reviewed the sections above and they reflect what I want generated.
          required: true
        - label: I understand the agent will open a PR for review — nothing merges automatically.
          required: true
