name: Custom Instructions Generator
description: "Copilot agent scans this repo, generates or updates copilot-instructions.md and code-review instructions, reviews the output, and opens a PR requesting review."
title: "[Instruction Generator] "
labels: ["copilot-instructions"]
assignees: ["copilot"]

body:
  - type: markdown
    attributes:
      value: |
        ## Custom Instructions Generator (Agent-Run)
        Submit this form and the assigned agent will scan the repo, generate instruction files, and open a PR.

  - type: textarea
    id: agent-instructions
    attributes:
      label: "Agent Instructions"
      description: |
        These are the instructions the agent will follow. You should not need to modify them.
      value: |
        1. Deep-scan this repo (all source files, dependencies, CI/CD pipelines, documentation) to understand its structure, technology stack, conventions, and patterns.
        2. Generate or update `.github/copilot-instructions.md` with the sections listed below.
        3. Generate or update `.github/instructions/code-review.instructions.md` with the sections listed below.
           CRITICAL: code-review.instructions.md MUST begin with this exact YAML frontmatter format:
           ---
           description: '<repo-specific description — derive from the repo name, purpose, and tech stack. NOT a generic description.>'
           applyTo: '**'
           excludeAgent: ["coding-agent"]
           ---
           The description field must be specific to THIS repository. Do not use generic text like "Code review instructions that can be customized for any project".
        4. Self-review the generated files for accuracy, completeness, and consistency.
        5. Refine as necessary based on the self-review.
        6. Open a PR requesting the designated reviewer (if provided) or CODEOWNERS.
        7. Link the PR to this issue so it auto-closes on merge.
        8. If required info is missing or the repo cannot be analyzed, comment on this issue and stop (no PR).
    validations:
      required: true

  - type: input
    id: reviewer
    attributes:
      label: PR reviewer (GitHub username, optional)
      description: Leave blank to default to CODEOWNERS.
      placeholder: "@codeowner"
    validations:
      required: false

  - type: textarea
    id: copilot-instructions-sections
    attributes:
      label: "Sections to include in copilot-instructions.md"
      description: |
        Select or customize the sections the agent should produce in copilot-instructions.md.
        Remove or add lines as needed. The agent will populate each section based on repo analysis.
      value: |
        - Project Overview & Structure
        - Technology Stack & Preferred Libraries
        - Coding Style & Naming Conventions
        - Architectural Patterns (to follow or avoid)
        - Security Requirements & Error Handling
        - Documentation Standards
    validations:
      required: true

  - type: textarea
    id: code-review-sections
    attributes:
      label: "Sections to include in code-review.instructions.md"
      description: "Customize the sections below. The frontmatter requirement is in the Agent Instructions above."
      value: |
        The file MUST begin with YAML frontmatter:
        ---
        description: '<repo-specific description derived from repo name, purpose, and tech stack>'
        applyTo: '**'
        excludeAgent: ["coding-agent"]
        ---

        Then include these sections:
        - Review Philosophy & Principles
        - Primary Review Priorities (ordered)
        - Language / Framework-Specific Guidance
        - What NOT to Flag (linter/formatter territory)
        - Comment Style & Tone (prefix, length, confidence threshold)
        - Example Comments (good and bad)
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context or constraints (optional)
      description: |
        Provide any extra instructions the agent should follow, such as:
        - Specific conventions to enforce or avoid
        - Team preferences for naming, imports, or patterns
        - Sections to skip or emphasize
        - Links to external style guides
      placeholder: |
        - Enforce PascalCase for component names
        - We use Conventional Commits
        - Skip the security section — handled by a separate policy
